<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AshFox's Fan Community</title>
    <link rel="stylesheet" href="style.css">
    <!-- Pixel font for Minecraft aesthetic -->
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Ubuntu:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="particles-js"></div>
    
    <nav class="navbar">
        <div class="logo">
            <span class="mc-text diamond">Ash</span><span class="mc-text gold">Fox</span>
        </div>
        <ul class="nav-links">
            <li><a href="#home" class="mc-btn">Home</a></li>
            <li><a href="#videos" class="mc-btn">Videos</a></li>
            <li><a href="https://discord.com/channels/@me" class="mc-btn">Massege Me</a></li>
            <li><a href="https://discord.gg/jH4Ty2rg" class="mc-btn">Join Discord Server</a></li>
            <li><a href="#gallery" class="mc-btn">Gallery</a></li>
        </ul>
    </nav>

    <header id="home" class="hero">
        <div class="hero-content">
            <h1 class="title">Welcome to <br><span class="highlight">AshFox's Fan Community</span></h1>
            <p class="subtitle">The ultimate hub for builds, survival tips, and epic adventures!</p>
            <div class="cta-buttons">
                <button class="mc-btn primary" onclick="playClick()">Join the Realm</button>
                <button class="mc-btn secondary" onclick="playClick()">Watch Latest</button>
            </div>
        </div>
        
        <!-- Interactive 3D CSS Block -->
        <div class="cube-container">
            <div class="cube" id="mc-cube">
                <div class="face front"></div>
                <div class="face back"></div>
                <div class="face right"></div>
                <div class="face left"></div>
                <div class="face top"></div>
                <div class="face bottom"></div>
            </div>
        </div>
    </header>

    <section id="videos" class="section">
        <div><a href="https://www.youtube.com/watch?v=CRTTbTAGGDs" class="mc-btn">My Hardcore Video</a></div>
        <Br>
         <div><a href="https://www.youtube.com/watch?v=5Q88Lh7tfhA&t=64s" class="mc-btn">My PVP Video</a></div>
    </section>

    <!-- JS Particles Library -->
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
